{% extends "base.html" %}

{% block title %}Community Chat - Ghana Market Pulse{% endblock %}

{% block content %}
<div class="header">
    <h1>💬 Community Chat</h1>
    <p>Share your thoughts about stocks and predictions</p>
</div>

<style>
    .chat-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        height: 600px;
        max-width: 800px;
        margin: 30px auto;
    }
    
    .chat-header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        border-radius: 10px 10px 0 0;
        font-weight: 600;
    }
    
    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #f8f9fa;
    }
    
    .message {
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 5px;
        word-wrap: break-word;
    }
    
    .message.other {
        background: #ecf0f1;
        color: #2c3e50;
        margin-left: 10px;
    }
    
    .message-username {
        font-weight: 600;
        margin-bottom: 5px;
    }
    
    .message-timestamp {
        font-size: 0.8em;
        opacity: 0.7;
        margin-top: 5px;
    }
    
    .input-section {
        padding: 15px;
        border-top: 1px solid #ecf0f1;
        display: flex;
        gap: 10px;
    }
    
    .input-section input {
        flex: 1;
        padding: 10px;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        font-size: 1em;
    }
    
    .input-section button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }
    
    .input-section button:hover {
        background: #2980b9;
    }
    
    .loading {
        text-align: center;
        color: #7f8c8d;
        padding: 20px;
    }
</style>

<div class="chat-container">
    <div class="chat-header">👥 Community Messages</div>
    <div class="messages" id="communityMessages">
        <div class="loading">Loading messages...</div>
    </div>
    <div class="input-section">
        <input type="text" id="communityInput" placeholder="Share your thoughts..." maxlength="500">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function loadMessages() {
        try {
            const response = await fetch('/api/chat/messages');
            const messages = await response.json();
            displayMessages(messages);
        } catch (error) {
            console.error('Error loading messages:', error);
        }
    }

    function displayMessages(messages) {
        const container = document.getElementById('communityMessages');
        if (messages.length === 0) {
            container.innerHTML = '<div class="loading">No messages yet. Be the first to share!</div>';
            return;
        }
        
        container.innerHTML = messages.map(msg => `
            <div class="message other">
                <div class="message-username">${msg.username}</div>
                <div>${msg.message}</div>
                <div class="message-timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('communityInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        try {
            const response = await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            
            if (response.ok) {
                input.value = '';
                loadMessages();
            }
        } catch (error) {
            console.error('Error sending message:', error);
        }
    }

    // Load messages on page load
    loadMessages();
    
    // Allow Enter key
    document.getElementById('communityInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
